; =============================================================================
; BOOT.INI - KSDOS Boot Configuration
; Boot loader configuration and options
; =============================================================================

[boot loader]
timeout=30
default=multi(0)disk(0)rdisk(0)partition(1)\KSDOS

[operating systems]
multi(0)disk(0)rdisk(0)partition(1)\KSDOS="KSDOS Professional v2.0" /fastdetect
multi(0)disk(0)rdisk(0)partition(1)\KSDOS="KSDOS Safe Mode" /safeboot:minimal
multi(0)disk(0)rdisk(0)partition(1)\KSDOS="KSDOS VGA Mode" /basevideo
multi(0)disk(0)rdisk(0)partition(1)\KSDOS="KSDOS Debug Mode" /debug
