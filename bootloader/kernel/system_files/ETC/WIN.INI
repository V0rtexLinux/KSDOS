; =============================================================================
; WIN.INI - KSDOS Windows Configuration
; Application and desktop environment configuration
; =============================================================================

[windows]
load=
run=
NullPort=None
Beep=yes
Spooler=yes
BorderWidth=3
CursorBlinkRate=530
DoubleClickSpeed=500
KeyboardSpeed=31
KeyboardDelay=2
ScreenSaveTimeOut=300
ScreenSaveActive=0

[Desktop]
Wallpaper=
TileWallpaper=0
Pattern=(None)

[Extensions]
txt=notepad.exe ^.txt
doc=winword.exe ^.doc
xls=excel.exe ^.xls
bmp=pbrush.exe ^.bmp

[fonts]
Courier (TrueType)=COUR.TTF
Arial (TrueType)=ARIAL.TTF
Times New Roman (TrueType)=TIMES.TTF

[ksdos]
theme=Default
language=en-US
timezone=UTC-03:00
