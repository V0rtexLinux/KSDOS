name: Build and Test OS

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm gcc binutils coreutils qemu-system-x86 \
            make

      - name: Show directory structure
        run: |
          echo "Arquivos no bootloader/boot:"
          ls -la bootloader/boot/
          echo "Arquivos no bootloader/core:"
          ls -la bootloader/core/

      - name: Build
        run: make

      - name: Check bootloader
        run: |
          echo "--- boot.bin ---"
          wc -c build/boot.bin
          hexdump -C build/boot.bin | tail -2
          # Verifica assinatura 55 AA
          if ! hexdump -C build/boot.bin | grep -q "55 aa"; then
            echo "❌ Assinatura de boot ausente!"
            exit 1
          fi

      - name: Check early.bin
        run: |
          if [ -f build/core/early.bin ]; then
            echo "--- early.bin ---"
            wc -c build/core/early.bin
            # Deve ter exatamente 256 bytes
            if [ $(wc -c < build/core/early.bin) -ne 256 ]; then
              echo "❌ early.bin não tem 256 bytes!"
              exit 1
            fi
          else
            echo "⚠️  early.bin não encontrado (pode ser normal se não existir)"
          fi

      - name: Check after.bin size
        run: |
          echo "--- after.bin ---"
          wc -c build/core/after.bin
          SIZE=$(wc -c < build/core/after.bin)
          MAX=$((24576 - 256))
          if [ $SIZE -gt $MAX ]; then
            echo "❌ after.bin é maior que $MAX bytes (limite para 48 setores)"
            echo "Aumente o número de setores no bootloader e no Makefile"
            exit 1
          fi

      - name: Check core.bin
        run: |
          echo "--- core.bin ---"
          wc -c build/core.bin
          if [ $(wc -c < build/core.bin) -ne 24576 ]; then
            echo "❌ core.bin não tem 24576 bytes"
            exit 1
          fi

      - name: Inspect final image
        run: |
          echo "--- ksdos.img (primeiros 512 bytes) ---"
          hexdump -C build/ksdos.img | head -20
          echo "--- Setor 1 da imagem (início do kernel) ---"
          dd if=build/ksdos.img bs=512 skip=1 count=1 2>/dev/null | hexdump -C | head -10

      - name: Test with QEMU (headless)
        run: |
            echo "--- Iniciando QEMU (máx 10 segundos) ---"
            # Executa QEMU sem serial, apenas monitorando resets
            timeout 10s qemu-system-i386 -fda build/ksdos.img \
            -nographic -display none -monitor null \
            -no-reboot -d int,cpu_reset 2>&1 | tee qemu.log || true

            echo "--- Log de depuração do QEMU ---"
            cat qemu.log

            # Verifica se houve reset ou triple fault (indicam falha)
            if grep -Eiq "resetting|triple fault" qemu.log; then
              echo "❌ Sistema reiniciou ou triple fault detectado — boot falhou!"
            exit 1
            fi

            # Verifica se o QEMU terminou antes do timeout (código 124 = timeout ok)
            # O timeout retorna 124 se o comando foi interrompido pelo tempo limite
            # Se retornou 0, significa que o QEMU terminou antes (provavelmente reboot)
            if [ $? -eq 0 ]; then
              echo "⚠️  QEMU terminou antes do tempo (possível reboot precoce)"
            exit 1
            fi

            echo "✅ Nenhum reset detectado — imagem parece inicializável"

      - name: Upload image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ksdos-image
          path: build/ksdos.img
