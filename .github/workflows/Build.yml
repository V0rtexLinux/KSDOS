name: KSDOS CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Rodar Compilação
        run: make

      - name: Upload Artefato
        uses: actions/upload-artifact@v4
        with:
          name: ksdos-image
          path: build/ksdos.img
